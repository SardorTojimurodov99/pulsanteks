{% extends "worker/base.html" %}
{% block content %}
<h5>Zakaz qo‘shish</h5>

<form method="post" class="card p-3">
  {% csrf_token %}

  <div class="mb-2">
    <label class="form-label">Zakaz beruvchi nomi</label>
    <input name="customer_name" class="form-control" required>
  </div>

  <div class="mb-2">
    <label class="form-label">O‘lcham (mm)</label>
    <input name="size_mm" class="form-control" type="number" required>
  </div>

  <div class="mb-2">
    <label class="form-label">Rang</label>
    <select name="color_id" class="form-select" required>
      <option value="">—</option>
      {% for c in colors %}
        <option value="{{ c.id }}">{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-2">
    <label class="form-label">Nechi kg quyish</label>
    <input name="kg_plan" class="form-control" required>
  </div>

  <div class="mb-2">
    <label class="form-label">List soni</label>
    <input name="list_plan" class="form-control" type="number" value="0">
  </div>

  <div class="mb-2">
    <label class="form-label">Finish</label>
    <select name="finish" class="form-select">
      <option value="YALTIROQ">Yaltiroq</option>
      <option value="MATIVIY">Mativiy</option>
    </select>
  </div>

  <div class="form-check mb-2">
    <input class="form-check-input" type="checkbox" name="laser" value="1" id="laser">
    <label class="form-check-label" for="laser">Lazer</label>
  </div>

  <div class="mb-3">
    <label class="form-label">Lazer matni (bo‘lsa)</label>
    <input name="laser_text" class="form-control">
  </div>

  <button class="btn btn-success">Saqlash</button>
</form>
{% endblock %}
