<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Worker Login</title>
</head>
<body style="font-family: sans-serif; max-width: 420px; margin: 30px auto;">
  <h2>Kirish</h2>
  {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Login</label><br>
    <input name="username" style="width:100%;padding:10px"><br><br>
    <label>Parol</label><br>
    <input name="password" type="password" style="width:100%;padding:10px"><br><br>
    <button style="width:100%;padding:12px">Kirish</button>
  </form>
</body>
</html>
