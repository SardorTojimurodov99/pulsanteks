{% extends "base.html" %}

{% block content %}

<h2>Worker panel</h2>

<table border="1">
<tr>
<th>Batch</th>
<th>Zakas</th>
<th>Stage</th>
<th>Action</th>
</tr>

{% for batch in batches %}
<tr>
<td>{{ batch.id }}</td>
<td>{{ batch.order }}</td>
<td>{{ batch.stage }}</td>

<td>
<a href="{% url 'worker_batch_detail' batch.pk %}">
Ochish
</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
