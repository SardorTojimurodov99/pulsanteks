{% extends "base.html" %}
{% block content %}
<h1>{{ title }}</h1>
<form method="post">
  {% csrf_token %}
  <div class="card">{{ form.as_p }}</div>
  <div class="card">
    {{ formset.management_form }}
    {% for subform in formset %}
      <div style="border:1px solid #ddd; padding:12px; margin-bottom:12px;">
        {{ subform.as_p }}
      </div>
    {% endfor %}
  </div>
  <button class="btn" type="submit">Saqlash</button>
</form>
{% endblock %}
