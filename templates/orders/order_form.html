{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<form method="post">
    {% csrf_token %}
    <div class="card">
        <h3>Zakaz ma'lumotlari</h3>
        <div class="two-col">
            {{ form.as_p }}
        </div>
    </div>

    <div class="card">
        <h3>Tarkib ma'lumotlari</h3>
        <div class="two-col" id="item-fields">
            {{ item_form.as_p }}
        </div>
    </div>

    <button class="btn btn-secondary" type="submit" name="action" value="save_only">Saqlash</button>
    <button class="btn" type="submit" name="action" value="save_release">Jarayonga o'tkazish</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const coatedInput = document.querySelector('input[name="is_coated"]');
    const coatingCount = document.querySelector('[name="coating_count"]')?.closest('p, div');
    const coatingNote = document.querySelector('[name="coating_note"]')?.closest('p, div');
    const secondColor = document.querySelector('[name="secondary_color"]')?.closest('p, div');
    const laserSelect = document.querySelector('[name="laser"]');
    const laserNote = document.querySelector('[name="laser_note"]')?.closest('p, div');

    function toggleCoating() {
        const show = coatedInput && coatedInput.checked;
        if (coatingCount) coatingCount.style.display = show ? "block" : "none";
        if (coatingNote) coatingNote.style.display = show ? "block" : "none";
        if (secondColor) secondColor.style.display = show ? "block" : "none";
    }
    function toggleLaser() {
        const show = laserSelect && laserSelect.value === "LASER";
        if (laserNote) laserNote.style.display = show ? "block" : "none";
    }
    if (coatedInput) {
        coatedInput.addEventListener("change", toggleCoating);
        toggleCoating();
    }
    if (laserSelect) {
        laserSelect.addEventListener("change", toggleLaser);
        toggleLaser();
    }
});
</script>
{% endblock %}
